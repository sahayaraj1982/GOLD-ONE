<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg: #0c40bb; --n-col: #ffffff; --out: #54301d; --btm: #0b08d4; }
        body { background-color: #475569; font-family: 'Arial Black', sans-serif; font-weight: 950; }
        #loginOverlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 30px; border: 8px solid #000; width: 95%; max-width: 400px; box-shadow: 0 15px 0 #000; }
        .main-app-box { border: 10px solid var(--out); margin: 10px auto; border-radius: 40px; background: #f1f5f9; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .cat-card { background: #fff; border: 4px solid var(--out); border-radius: 20px; text-align: center; padding: 15px; box-shadow: 6px 6px 0px var(--out); }
        .hidden { display: none !important; }
        input, select { border: 3px solid #000 !important; outline: none; }
    </style>
</head>
<body onload="init()">

<div id="loginOverlay">
    <div class="login-box text-center">
        <h2 class="text-3xl mb-6 italic uppercase">SAHA LOGIN</h2>
        <input type="text" id="logUser" placeholder="USER ID" class="w-full p-4 mb-4 rounded-xl text-center uppercase">
        <input type="password" id="logPin" placeholder="PASSWORD" class="w-full p-4 mb-6 rounded-xl text-center">
        <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl text-white text-xl border-b-8 border-blue-900 active:border-b-0 active:translate-y-2 uppercase">ENTER ✅</button>
    </div>
</div>

<div id="appPage" class="hidden">
    <div id="mainContainer" class="main-app-box mx-auto w-[95%]">
        <div class="bg-[#0c40bb] p-6 border-b-[10px] border-[#0b08d4]">
            <div class="flex justify-between items-center text-white">
                <div class="flex items-center gap-4">
                    <button onclick="logout()" class="bg-red-600 w-10 h-10 rounded-full border-2 border-white text-[10px]">EXIT</button>
                    <div>
                        <h1 class="text-3xl italic uppercase" id="dispTitle">SAHAYARAJ-2026</h1>
                        <p id="expiryDisplay" class="text-yellow-400 text-xs font-bold"></p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] opacity-70 uppercase">Balance</p>
                    <h2 id="mainTotal" class="text-4xl">₹0</h2>
                </div>
            </div>
        </div>

        <div class="p-4">
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

            <div class="grid lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[8px_8px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-green-600 mb-4 italic uppercase">Entry</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="eDate" class="p-3 rounded-xl">
                        <input type="tel" id="eMob" placeholder="Mobile" class="p-3 rounded-xl">
                        <select id="eCat" class="p-3 rounded-xl"></select>
                        <input type="number" id="eAmt" placeholder="Amount" class="p-3 rounded-xl">
                        <input type="text" id="eDesc" placeholder="Remark" class="col-span-2 p-3 rounded-xl">
                        <select id="eType" class="col-span-2 p-3 rounded-xl bg-gray-50">
                            <option value="CR">IN (+)</option>
                            <option value="DR">OUT (-)</option>
                        </select>
                    </div>
                    <button onclick="saveData()" class="w-full bg-green-600 text-white py-4 mt-6 rounded-xl text-xl border-b-4 border-black active:translate-y-1">SAVE ✅</button>
                </div>

                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[8px_8px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-blue-600 mb-4 italic uppercase">Dashboard</h3>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button onclick="promptAddCat()" class="bg-cyan-600 text-white py-2 rounded-xl border-b-4 border-black font-bold">+ ADD CAT</button>
                        <button onclick="promptDelCat()" class="bg-pink-600 text-white py-2 rounded-xl border-b-4 border-black font-bold">- DEL CAT</button>
                        <button onclick="downloadPDF()" class="bg-orange-600 text-white py-2 rounded-xl border-b-4 border-black font-bold">PDF</button>
                        <button onclick="deleteAll()" class="bg-red-900 text-white py-2 rounded-xl border-b-4 border-black font-bold">CLEAR ALL</button>
                    </div>
                    <div class="overflow-y-auto max-h-[250px] border-2 border-black rounded-xl">
                        <table class="w-full text-xs">
                            <thead class="bg-black text-white"><tr><th class="p-2">DATE</th><th class="p-2">CAT</th><th class="p-2">AMT</th></tr></thead>
                            <tbody id="resTable" class="text-center"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const USERS = [
    { id: "FLOR", pin: "1234", exp: "2026-12-30" },
    { id: "SAHA", pin: "2233", exp: "2026-06-15" },
    { id: "PANEER", pin: "4455", exp: "2026-08-20" }
];

let cfg = JSON.parse(localStorage.getItem('saha_v66_cfg')) || {
    isLogged: false, currentUser: "", expiryDate: "", cats: [], title: "SAHAYARAJ-2026"
};
let db = JSON.parse(localStorage.getItem('saha_v66_db')) || [];

function init() {
    if (cfg.isLogged) showApp();
    renderUI(); refresh();
}

function handleLogin() {
    const u = document.getElementById('logUser').value.trim().toUpperCase();
    const p = document.getElementById('logPin').value.trim();
    const today = new Date().toISOString().split('T')[0];
    const found = USERS.find(x => x.id === u && x.pin === p);

    if (found) {
        if (today <= found.exp) {
            cfg.isLogged = true; cfg.currentUser = found.id; cfg.expiryDate = found.exp;
            localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg));
            showApp();
        } else { alert("காலாவதியாகிவிட்டது!"); }
    } else { alert("தவறான ஐடி அல்லது பாஸ்வேர்டு!"); }
}

function showApp() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('expiryDisplay').innerText = "EXP: " + cfg.expiryDate.split('-').reverse().join('/');
}

function renderUI() {
    const grid = document.getElementById('catGrid'), sel = document.getElementById('eCat');
    grid.innerHTML = ""; sel.innerHTML = "";
    if(cfg.cats.length === 0) {
        grid.innerHTML = "<p class='col-span-full text-center text-gray-500 italic py-4 uppercase'>Add Category First</p>";
        sel.innerHTML = "<option value=''>SELECT CAT</option>";
    } else {
        cfg.cats.forEach(c => {
            grid.innerHTML += `<div class="cat-card"><p class="text-[10px] text-red-600 uppercase mb-1 font-bold">${c}</p><h3 class="text-2xl text-blue-900" id="sum_${c}">₹0</h3></div>`;
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }
}

function refresh() {
    db.sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = "", grand = 0, sums = {};
    cfg.cats.forEach(c => sums[c] = 0);
    db.forEach(t => {
        let amt = parseFloat(t.amt) || 0;
        let val = (t.type === "CR") ? amt : -amt;
        grand += val;
        if(sums.hasOwnProperty(t.cat)) sums[t.cat] += val;
        html += `<tr class="border-b"><td>${t.date.split('-').reverse().join('/')}</td><td>${t.cat}</td><td class="${t.type==='CR'?'text-green-600':'text-red-600'} font-bold">₹${amt}</td></tr>`;
    });
    document.getElementById('resTable').innerHTML = html;
    document.getElementById('mainTotal').innerText = "₹" + grand.toLocaleString();
    cfg.cats.forEach(c => { const el = document.getElementById('sum_' + c); if(el) el.innerText = "₹" + (sums[c] || 0).toLocaleString(); });
}

function saveData() {
    const entry = { id: Date.now(), date: document.getElementById('eDate').value, cat: document.getElementById('eCat').value, amt: document.getElementById('eAmt').value, desc: document.getElementById('eDesc').value || "-", type: document.getElementById('eType').value };
    if(!entry.date || !entry.amt || !entry.cat) return alert("விவரங்களை நிரப்பவும்!");
    db.push(entry);
    localStorage.setItem('saha_v66_db', JSON.stringify(db));
    refresh();
}

function promptAddCat() {
    const n = prompt("புதிய கேட்டகிரி:");
    if(n) { const name = n.trim().toUpperCase(); if(!cfg.cats.includes(name)) { cfg.cats.push(name); localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); renderUI(); refresh(); } }
}

function promptDelCat() {
    const n = prompt("நீக்க வேண்டிய பெயர்:");
    if(n) { const name = n.trim().toUpperCase(); if(confirm("நீக்கவா?")) { cfg.cats = cfg.cats.filter(c => c !== name); localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); renderUI(); refresh(); } }
}

function deleteAll() { if(confirm("அனைத்து டேட்டாவையும் அழிக்கவா?")) { db = []; localStorage.setItem('saha_v66_db', JSON.stringify(db)); refresh(); } }
function logout() { cfg.isLogged = false; localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); location.reload(); }
</script>
</body>
</html>
