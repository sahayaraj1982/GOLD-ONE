<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --p-bg: #0c40bb; --n-col: #ffffff; --out: #54301d; --btm: #0b08d4; }
        body { background-color: #475569; font-family: 'Arial Black', sans-serif; font-weight: 950; }
        #loginOverlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 30px; border: 8px solid #000; width: 95%; max-width: 400px; box-shadow: 0 15px 0 #000; }
        .main-app-box { border: 10px solid var(--out); margin: 10px auto; border-radius: 40px; background: #f1f5f9; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .cat-card { background: #fff; border: 4px solid var(--out); border-radius: 20px; text-align: center; padding: 15px; box-shadow: 6px 6px 0px var(--out); }
        .hidden { display: none !important; }
        input, select { border: 3px solid #000 !important; }
    </style>
</head>
<body onload="init()">

<div id="loginOverlay">
    <div class="login-box text-center">
        <h2 class="text-3xl mb-6 italic uppercase">SAHA LOGIN</h2>
        <input type="text" id="logUser" placeholder="USER ID" class="w-full p-4 mb-4 rounded-xl text-center uppercase outline-none">
        <input type="password" id="logPin" placeholder="PASSWORD" class="w-full p-4 mb-6 rounded-xl text-center outline-none">
        <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl text-white text-xl border-b-8 border-blue-900 active:border-b-0 active:translate-y-2">LOG IN ✅</button>
        <p class="mt-4 text-[10px] text-gray-400 uppercase">Secure Access V6.6</p>
    </div>
</div>

<div id="appPage" class="hidden">
    <div id="mainContainer" class="main-app-box mx-auto w-[95%]">
        <div class="bg-[#0c40bb] p-6 border-b-[10px] border-[#0b08d4]">
            <div class="flex justify-between items-center text-white">
                <div class="flex items-center gap-4">
                    <button onclick="logout()" class="bg-red-600 w-10 h-10 rounded-full border-2 border-white text-xs">OFF</button>
                    <div>
                        <h1 class="text-3xl italic uppercase" id="dispTitle">SAHAYARAJ-2026</h1>
                        <p id="expiryDisplay" class="text-yellow-400 text-xs font-bold"></p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] opacity-70">TOTAL BALANCE</p>
                    <h2 id="mainTotal" class="text-4xl" style="text-shadow: 2px 2px 0 #000;">₹0</h2>
                </div>
            </div>
        </div>

        <div class="p-4">
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-4 gap-5 mb-8"></div>

            <div class="grid lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[8px_8px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-green-600 mb-4 italic uppercase">New Entry</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="eDate" class="p-3 rounded-xl">
                        <input type="tel" id="eMob" placeholder="Mobile" class="p-3 rounded-xl">
                        <select id="eCat" class="p-3 rounded-xl"></select>
                        <input type="number" id="eAmt" placeholder="Amount" class="p-3 rounded-xl">
                        <input type="text" id="eDesc" placeholder="Remark" class="col-span-2 p-3 rounded-xl">
                        <select id="eType" class="col-span-2 p-3 rounded-xl bg-gray-100">
                            <option value="CR">CASH IN (+)</option>
                            <option value="DR">CASH OUT (-)</option>
                        </select>
                    </div>
                    <button onclick="saveData()" class="w-full bg-green-600 text-white py-4 mt-6 rounded-xl text-xl border-b-4 border-black active:border-b-0 active:translate-y-1">SAVE ENTRY ✅</button>
                </div>

                <div class="bg-white p-6 rounded-3xl border-4 border-black shadow-[8px_8px_0px_#000]">
                    <h3 class="text-xl border-b-4 border-blue-600 mb-4 italic uppercase">Controls</h3>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button onclick="promptAddCat()" class="bg-cyan-600 text-white py-3 rounded-xl border-b-4 border-black active:translate-y-1 font-bold">+ ADD CATEGORY</button>
                        <button onclick="promptDelCat()" class="bg-pink-600 text-white py-3 rounded-xl border-b-4 border-black active:translate-y-1 font-bold">- DEL CATEGORY</button>
                        <button onclick="forceReset()" class="bg-black text-white py-3 rounded-xl border-b-4 border-gray-600 col-span-2 text-xs">RESET ALL DATA</button>
                    </div>
                    
                    <div class="overflow-y-auto max-h-[250px] border-2 border-black rounded-xl">
                        <table class="w-full text-xs">
                            <thead class="bg-black text-white">
                                <tr><th class="p-2">DATE</th><th class="p-2">CAT</th><th class="p-2 text-right">AMT</th></tr>
                            </thead>
                            <tbody id="resTable" class="text-center divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// லாகின் டேட்டாபேஸ்
const USERS_LIST = [
    { id: "FLOR", pin: "1234", exp: "2026-12-30" },
    { id: "SAHA", pin: "2233", exp: "2026-06-15" },
    { id: "PANEER", pin: "4455", exp: "2026-08-20" }
];

// கான்பிகரேஷன் - பெயர்கள் எதுவும் முன்னதாக இருக்காது (Empty Cats)
let cfg = JSON.parse(localStorage.getItem('saha_v66_cfg')) || {
    isLogged: false,
    currentUser: "",
    expiryDate: "",
    cats: [], // இது காலியாக இருக்கும், யூசர் தான் ஆட் செய்ய வேண்டும்
    title: "SAHAYARAJ-2026"
};

let db = JSON.parse(localStorage.getItem('saha_v66_db')) || [];

function init() {
    if (cfg.isLogged) showApp();
    renderUI();
    refresh();
}

function handleLogin() {
    const u = document.getElementById('logUser').value.trim().toUpperCase();
    const p = document.getElementById('logPin').value.trim();
    const today = new Date().toISOString().split('T')[0];
    const found = USERS_LIST.find(x => x.id === u && x.pin === p);

    if (found) {
        if (today <= found.exp) {
            cfg.isLogged = true;
            cfg.currentUser = found.id;
            cfg.expiryDate = found.exp;
            localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg));
            showApp();
        } else { alert("காலாவதியாகிவிட்டது! (EXPIRED)"); }
    } else { alert("தவறான ஐடி அல்லது பாஸ்வேர்டு!"); }
}

function showApp() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('expiryDisplay').innerText = "RENEWAL: " + cfg.expiryDate.split('-').reverse().join('/');
}

// கேட்டகிரி பட்டன்கள் மற்றும் செலக்ட் பாக்ஸை உருவாக்குதல்
function renderUI() {
    const grid = document.getElementById('catGrid'), sel = document.getElementById('eCat');
    grid.innerHTML = ""; sel.innerHTML = "";
    
    if(cfg.cats.length === 0) {
        grid.innerHTML = "<p class='col-span-full text-center text-gray-500 italic py-4'>Please add a category to start...</p>";
        sel.innerHTML = "<option>No Category</option>";
    } else {
        cfg.cats.forEach(c => {
            grid.innerHTML += `
                <div class="cat-card">
                    <p class="text-[10px] text-red-600 uppercase mb-1">${c}</p>
                    <h3 class="text-2xl text-blue-900" id="sum_${c}">₹0</h3>
                </div>`;
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }
}

// கணக்கீடுகள் மற்றும் டேபிள் அப்டேட்
function refresh() {
    db.sort((a, b) => new Date(b.date) - new Date(a.date));
    let html = "", grand = 0, sums = {};
    cfg.cats.forEach(c => sums[c] = 0);

    db.forEach(t => {
        let amt = parseFloat(t.amt) || 0;
        let val = (t.type === "CR") ? amt : -amt;
        grand += val;
        if(sums.hasOwnProperty(t.cat)) sums[t.cat] += val;

        html += `<tr class="hover:bg-gray-50">
            <td class="p-2">${t.date.split('-').reverse().join('/')}</td>
            <td class="p-2 font-bold">${t.cat}</td>
            <td class="p-2 text-right ${t.type==='CR'?'text-green-600':'text-red-600'}">₹${amt.toLocaleString()}</td>
        </tr>`;
    });

    document.getElementById('resTable').innerHTML = html;
    document.getElementById('mainTotal').innerText = "₹" + grand.toLocaleString();
    
    // ஒவ்வொரு பட்டனிலும் பேலன்ஸை அப்டேட் செய்தல்
    cfg.cats.forEach(c => {
        const el = document.getElementById('sum_' + c);
        if(el) el.innerText = "₹" + (sums[c] || 0).toLocaleString();
    });
}

function saveData() {
    const entry = {
        id: Date.now(),
        date: document.getElementById('eDate').value,
        mob: document.getElementById('eMob').value || "-",
        cat: document.getElementById('eCat').value,
        amt: document.getElementById('eAmt').value,
        desc: document.getElementById('eDesc').value || "-",
        type: document.getElementById('eType').value
    };
    
    if(!entry.date || !entry.amt || entry.cat === "No Category") return alert("சரியான விவரங்களை உள்ளிடவும்!");
    
    db.push(entry);
    localStorage.setItem('saha_v66_db', JSON.stringify(db));
    refresh();
    // பார்மை கிளியர் செய்தல்
    document.getElementById('eAmt').value = "";
    document.getElementById('eDesc').value = "";
}

// புது கேட்டகிரி சேர்க்க
function promptAddCat() {
    const n = prompt("புதிய கேட்டகிரி பெயர் (எ.கா: TICKET):");
    if(n) {
        const name = n.trim().toUpperCase();
        if(!cfg.cats.includes(name)) {
            cfg.cats.push(name);
            saveConfig();
            renderUI(); refresh();
        } else { alert("இந்த பெயர் ஏற்கனவே உள்ளது!"); }
    }
}

// கேட்டகிரி நீக்க
function promptDelCat() {
    const n = prompt("நீக்க வேண்டிய கேட்டகிரி பெயர்:");
    if(n) {
        const name = n.trim().toUpperCase();
        if(confirm(name + " கேட்டகிரியை நீக்கவா?")) {
            cfg.cats = cfg.cats.filter(c => c !== name);
            saveConfig();
            renderUI(); refresh();
        }
    }
}

function saveConfig() { localStorage.setItem('saha_v66_cfg', JSON.stringify(cfg)); }
function forceReset() { if(confirm("எல்லா தரவுகளையும் அழிக்கவா?")) { localStorage.clear(); location.reload(); } }
function logout() { cfg.isLogged = false; saveConfig(); location.reload(); }
</script>
</body>
</html>
