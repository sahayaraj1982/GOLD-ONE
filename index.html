<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026-ADVANCED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg: #0c40bb; --out: #54301d; --btm: #0b08d4; --dash: #f1f5f9; }
        body { background-color: #334155; font-family: 'Arial Black', sans-serif; }
        * { font-weight: 950 !important; }
        .natural-btn { 
            box-shadow: 0 5px 0px rgba(0,0,0,0.3); transition: 0.1s; border: 2px solid rgba(0,0,0,0.2);
        }
        .natural-btn:active { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.3); }
        .main-container { border: 10px solid var(--out); border-radius: 40px; background: var(--dash); width: 98%; max-width: 1400px; margin: auto; }
        .header-box { background: var(--p-bg); border-bottom: 8px solid var(--btm); border-radius: 30px 30px 0 0; color: white; padding: 20px; }
        .cat-btn { background: white; border: 3px solid var(--out); border-radius: 15px; padding: 10px; text-align: center; min-width: 120px; box-shadow: 4px 4px 0 var(--out); }
        .input-field { border: 3px solid #000; border-radius: 12px; padding: 10px; width: 100%; }
        #loginPage, #appPage { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="init()">

<div id="loginPage" class="flex flex-col bg-slate-900 text-white">
    <div class="bg-white p-8 rounded-3xl border-8 border-blue-700 text-black w-80 text-center">
        <h2 class="text-2xl mb-4 font-bold">SAHAYARAJ-2026</h2>
        <input type="password" id="loginPass" placeholder="PASSWORD" class="input-field mb-4 text-center">
        <button onclick="checkLogin()" class="w-full bg-blue-700 text-white py-3 rounded-xl natural-btn">LOGIN</button>
        <p class="mt-4 text-xs text-gray-500">Contact: 9361203202</p>
    </div>
</div>

<div id="appPage" class="hidden p-2">
    <div class="main-container overflow-hidden">
        <div class="header-box flex justify-between items-center">
            <div class="text-left">
                <h1 id="dispTitle" class="text-3xl italic uppercase">SAHAYARAJ-2026</h1>
                <p id="clock" class="text-sm font-mono text-yellow-300"></p>
                <p id="startDateLabel" class="text-[10px] text-white/70"></p>
            </div>
            <div class="text-right">
                <p class="text-xs">RECORDS: <span id="recCount" class="text-yellow-400">0</span></p>
                <h2 id="mainTotal" class="text-5xl font-black">₹0</h2>
            </div>
        </div>

        <div class="flex justify-center gap-6 py-4 bg-gray-200 border-b-4 border-black">
            <button onclick="document.getElementById('bellDate').showPicker()" class="p-3 bg-white rounded-xl border-2 border-black natural-btn">🔔</button>
            <input type="date" id="bellDate" onchange="updateStart()" class="hidden">
            <button onclick="openSettings()" class="p-3 bg-white rounded-xl border-2 border-black natural-btn">⚙️</button>
            <button onclick="exportData()" class="p-3 bg-white rounded-xl border-2 border-black natural-btn">📤 EXPORT</button>
            <button onclick="document.getElementById('impFile').click()" class="p-3 bg-white rounded-xl border-2 border-black natural-btn">📥 IMPORT</button>
            <input type="file" id="impFile" onchange="importData(this)" class="hidden">
        </div>

        <div class="p-4">
            <div id="catGrid" class="flex flex-wrap justify-center gap-4 mb-6"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-3xl border-4 border-black">
                    <h3 class="border-b-4 border-green-600 mb-4 uppercase">New Entry</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="date" id="eDate" class="input-field">
                        <input type="tel" id="eMob" placeholder="Mobile" class="input-field">
                        <select id="eCat" class="input-field"></select>
                        <input type="text" id="eDesc" placeholder="Remark" class="input-field">
                        <input type="number" id="eAmt" placeholder="Amount" class="input-field">
                        <select id="eType" class="input-field"><option value="CR">IN (+)</option><option value="DR">OUT (-)</option></select>
                    </div>
                    <button id="saveBtn" onclick="save()" class="w-full py-4 mt-4 bg-green-600 text-white rounded-2xl text-2xl natural-btn">SAVE ✅</button>
                </div>

                <div class="bg-white p-5 rounded-3xl border-4 border-black">
                    <h3 class="border-b-4 border-blue-600 mb-4 uppercase">Search & Tools</h3>
                    <div class="grid grid-cols-3 gap-2 mb-4 text-xs">
                        <input type="date" id="fDate" class="border-2 border-black p-1">
                        <input type="date" id="tDate" class="border-2 border-black p-1">
                        <input type="tel" id="sMob" placeholder="Mobile" class="border-2 border-black p-1">
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="pdf()" class="bg-orange-600 text-white py-3 rounded-lg natural-btn">PDF</button>
                        <button onclick="wa()" class="bg-green-600 text-white py-3 rounded-lg natural-btn">WHATSAPP</button>
                        <button onclick="clearAll()" class="bg-red-600 text-white py-3 rounded-lg natural-btn">DELETE ALL</button>
                    </div>
                    <button onclick="refresh()" class="w-full bg-slate-800 text-white py-4 mt-4 rounded-xl natural-btn">SEARCH DATA 🔎</button>
                </div>
            </div>

            <div class="mt-6 bg-white border-4 border-black rounded-2xl overflow-hidden shadow-2xl">
                <table class="w-full text-center">
                    <thead class="bg-black text-white">
                        <tr><th class="p-3">DATE</th><th class="p-3">MOBILE</th><th class="p-3">CAT</th><th class="p-3">REMARK</th><th class="p-3">AMOUNT</th><th class="p-3">X</th></tr>
                    </thead>
                    <tbody id="resTable" class="divide-y-2 divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="setModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-3xl border-8 border-black max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <h2 class="text-2xl font-bold border-b-4 border-red-600 mb-4">GENERAL SETTINGS</h2>
        <div class="grid grid-cols-2 gap-4 text-sm">
            <div>App Name <input type="text" id="sTitle" class="input-field py-1"></div>
            <div>Banner Color <input type="color" id="sHCol" class="w-full h-10"></div>
            <div>Expiry Date <input type="text" id="sExp" value="30/04/2026" disabled class="input-field py-1 bg-gray-100"></div>
            <div class="flex items-center gap-2">Hide Balance <input type="checkbox" id="sHide" class="w-6 h-6"></div>
        </div>
        <div id="catNames" class="grid grid-cols-2 gap-2 mt-4"></div>
        <div class="flex gap-4 mt-6">
            <button onclick="saveSet()" class="flex-1 bg-green-600 text-white py-3 rounded-xl natural-btn">SAVE ALL</button>
            <button onclick="closeModals()" class="flex-1 bg-red-600 text-white py-3 rounded-xl natural-btn">CLOSE</button>
        </div>
    </div>
</div>

<script>
let cfg = JSON.parse(localStorage.getItem('saha_v8_cfg')) || {
    title: "SAHAYARAJ-2026", hCol: "#0c40bb", outCol: "#54301d", btmCol: "#0b08d4",
    dashCol: "#f1f5f9", hide: false, start: "",
    cats: ["TICKET","FINANCE","RO","OTHER","SHOP","GENERAL","EXTRA"]
};
let db = JSON.parse(localStorage.getItem('saha_v8_db')) || [];
let filtered = [];

function checkLogin() {
    if(document.getElementById('loginPass').value === "2026") {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
        init();
    } else alert("Wrong Password!");
}

function init() {
    updateClock(); setInterval(updateClock, 1000);
    document.documentElement.style.setProperty('--p-bg', cfg.hCol);
    document.documentElement.style.setProperty('--out', cfg.outCol);
    document.documentElement.style.setProperty('--dash', cfg.dashCol);
    document.getElementById('dispTitle').innerText = cfg.title;
    document.getElementById('mainTotal').style.display = cfg.hide ? 'none' : 'block';
    
    // Expiry Check
    const today = new Date();
    if(today > new Date("2026-04-30")) {
        document.getElementById('saveBtn').disabled = true;
        document.getElementById('saveBtn').innerText = "EXPIRED ⚠️";
        document.getElementById('saveBtn').classList.replace('bg-green-600', 'bg-gray-400');
    }
    
    renderUI(); refresh();
}

function updateClock() {
    const n = new Date();
    document.getElementById('clock').innerText = n.toLocaleDateString('en-GB') + " " + n.toLocaleTimeString('en-GB');
}

function renderUI() {
    const grid = document.getElementById('catGrid'), eSel = document.getElementById('eCat'), cArea = document.getElementById('catNames');
    grid.innerHTML = ""; eSel.innerHTML = ""; cArea.innerHTML = "";
    cfg.cats.forEach((c, i) => {
        grid.innerHTML += `<div class="cat-btn"><p class="text-[10px] text-red-600 uppercase">${c}</p><h3 class="text-xl text-blue-800">₹<span id="sum_${c}">0</span></h3></div>`;
        eSel.innerHTML += `<option value="${c}">${c}</option>`;
        cArea.innerHTML += `<div>A${i+1} Name <input type="text" id="cn_${i}" value="${c}" class="input-field py-1"></div>`;
    });
}

function refresh() {
    const fD = document.getElementById('fDate').value, tD = document.getElementById('tDate').value, sM = document.getElementById('sMob').value;
    let grand = 0, cSums = {}; cfg.cats.forEach(c => cSums[c] = 0);
    
    filtered = db.filter(t => {
        const mStart = (!cfg.start || t.date >= cfg.start); // Bell icon logic
        const mDate = (!fD || t.date >= fD) && (!tD || t.date <= tD);
        const mMob = (!sM || t.mob.includes(sM));
        return mStart && mDate && mMob;
    });

    let html = "";
    filtered.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
        let v = (t.type === "CR") ? parseFloat(t.amt) : -parseFloat(t.amt);
        cSums[t.cat] += v; grand += v;
        html += `<tr>
            <td class="p-3 text-xs">${t.date.split('-').reverse().join('/')}</td>
            <td class="p-3 text-xs">${t.mob}</td>
            <td class="p-3 text-xs font-bold">${t.cat}</td>
            <td class="p-3 text-xs text-blue-700">${t.desc}</td>
            <td class="p-3 font-bold ${t.type==='CR'?'text-green-600':'text-red-600'}">₹${t.amt}</td>
            <td class="p-3"><button onclick="del(${t.id})" class="text-red-600">✖</button></td>
        </tr>`;
    });

    document.getElementById('resTable').innerHTML = html;
    document.getElementById('mainTotal').innerText = "₹" + grand.toLocaleString();
    document.getElementById('recCount').innerText = filtered.length;
    cfg.cats.forEach(c => { if(document.getElementById('sum_'+c)) document.getElementById('sum_'+c).innerText = cSums[c].toLocaleString(); });
    if(cfg.start) document.getElementById('startDateLabel').innerText = "FROM: " + cfg.start.split('-').reverse().join('/');
}

function save() {
    const d = document.getElementById('eDate').value, a = document.getElementById('eAmt').value;
    if(!d || !a) return alert("Fill Date & Amount!");
    db.push({ id: Date.now(), date: d, mob: document.getElementById('eMob').value || "-", cat: document.getElementById('eCat').value, desc: document.getElementById('eDesc').value || "-", amt: a, type: document.getElementById('eType').value });
    localStorage.setItem('saha_v8_db', JSON.stringify(db));
    refresh();
}

function pdf() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(cfg.title + " REPORT", 14, 15);
    doc.autoTable({ 
        head: [['DATE', 'MOBILE', 'CAT', 'REMARK', 'AMT', 'TYPE']], 
        body: filtered.map(t => [t.date.split('-').reverse().join('/'), t.mob, t.cat, t.desc, t.amt, t.type]),
        startY: 20 
    });
    doc.save("Report.pdf");
}

function wa() {
    let msg = `*${cfg.title}*\nTotal: ${document.getElementById('mainTotal').innerText}\nRecords: ${filtered.length}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function exportData() {
    const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
}

function importData(input) {
    const reader = new FileReader();
    reader.onload = e => { db = JSON.parse(e.target.result); localStorage.setItem('saha_v8_db', JSON.stringify(db)); refresh(); };
    reader.readAsText(input.files[0]);
}

function openSettings() {
    if(prompt("SETTINGS PIN:") === "Saha@1982") {
        document.getElementById('setModal').classList.remove('hidden');
        document.getElementById('sTitle').value = cfg.title;
        document.getElementById('sHCol').value = cfg.hCol;
        document.getElementById('sHide').checked = cfg.hide;
    } else alert("Wrong Pin!");
}

function saveSet() {
    cfg.title = document.getElementById('sTitle').value;
    cfg.hCol = document.getElementById('sHCol').value;
    cfg.hide = document.getElementById('sHide').checked;
    cfg.cats.forEach((_, i) => { cfg.cats[i] = document.getElementById(`cn_${i}`).value.toUpperCase(); });
    localStorage.setItem('saha_v8_cfg', JSON.stringify(cfg));
    location.reload();
}

function updateStart() { cfg.start = document.getElementById('bellDate').value; refresh(); }
function closeModals() { document.getElementById('setModal').classList.add('hidden'); }
function del(id) { if(confirm("Delete?")) { db = db.filter(x => x.id !== id); localStorage.setItem('saha_v8_db', JSON.stringify(db)); refresh(); } }
function clearAll() { if(confirm("Clear All?")) { db = []; localStorage.setItem('saha_v8_db', JSON.stringify(db)); refresh(); } }
</script>
</body>
</html>
