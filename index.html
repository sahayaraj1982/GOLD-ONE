<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{background:#475569;font-family:Arial Black,sans-serif;}
        *{font-weight:900!important;}
        .btn-style{border-bottom:6px solid rgba(0,0,0,0.4);color:#fff!important;cursor:pointer;}
        .main-app-box{border:10px solid #54301d;margin:10px auto;border-radius:40px;background:#f1f5f9;width:95%;}
    </style>
</head>
<body onload="checkLogin()">

<!-- LOGIN PAGE -->
<div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-3xl border-4 border-black shadow-2xl w-[350px]">
        <h2 class="text-2xl text-center mb-6">USER LOGIN</h2>

        <input type="text" id="loginUser" placeholder="User ID"
            class="w-full border-2 border-black p-3 rounded-xl mb-4">

        <input type="password" id="loginPass" placeholder="Password"
            class="w-full border-2 border-black p-3 rounded-xl mb-4">

        <button onclick="loginUserCheck()"
            class="w-full bg-blue-700 text-white py-3 rounded-xl btn-style">
            LOGIN
        </button>
    </div>
</div>

<!-- APP PAGE -->
<div id="appPage" style="display:none;">
    <div class="main-app-box p-10">
        <h1 class="text-4xl text-center text-blue-800 mb-6">SAHAYARAJ-2026</h1>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="date" id="eDate" class="border-2 border-black p-3 rounded-xl">
            <input type="number" id="eAmt" placeholder="Amount" class="border-2 border-black p-3 rounded-xl">
            <input type="text" id="eCat" placeholder="Category" class="border-2 border-black p-3 rounded-xl">
            <input type="text" id="eDesc" placeholder="Remark" class="border-2 border-black p-3 rounded-xl">
        </div>

        <button onclick="saveData()" class="w-full bg-green-600 py-3 rounded-xl btn-style text-xl">
            SAVE
        </button>

        <div class="mt-8">
            <table class="w-full bg-white border-2 border-black">
                <thead class="bg-black text-white">
                    <tr>
                        <th class="p-3">DATE</th>
                        <th class="p-3">CATEGORY</th>
                        <th class="p-3">REMARK</th>
                        <th class="p-3">AMOUNT</th>
                    </tr>
                </thead>
                <tbody id="resTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('saha_users')) || [
    { id: "user1", pass: "1111", expiry: "2026-12-31" },
    { id: "user2", pass: "2222", expiry: "2026-12-31" },
    { id: "user3", pass: "3333", expiry: "2026-12-31" },
    { id: "user4", pass: "4444", expiry: "2026-12-31" },
    { id: "user5", pass: "5555", expiry: "2026-12-31" }
];

let db = JSON.parse(localStorage.getItem('saha_db')) || [];

function checkLogin(){
    document.getElementById("appPage").style.display="none";
}

function loginUserCheck(){
    let uid=document.getElementById("loginUser").value.trim();
    let pwd=document.getElementById("loginPass").value.trim();

    let user=users.find(u=>u.id===uid && u.pass===pwd);

    if(!user){
        alert("INVALID USER ID OR PASSWORD");
        return;
    }

    let today=new Date().toISOString().split("T")[0];

    if(today>user.expiry){
        alert("ACCOUNT EXPIRED");
        return;
    }

    document.getElementById("loginPage").style.display="none";
    document.getElementById("appPage").style.display="block";
    refresh();
}

function saveData(){
    let date=document.getElementById("eDate").value;
    let amt=document.getElementById("eAmt").value;
    let cat=document.getElementById("eCat").value;
    let desc=document.getElementById("eDesc").value;

    if(!date || !amt){
        alert("DATE AND AMOUNT REQUIRED");
        return;
    }

    db.push({
        date:date,
        amt:amt,
        cat:cat,
        desc:desc
    });

    localStorage.setItem("saha_db",JSON.stringify(db));

    document.getElementById("eAmt").value="";
    document.getElementById("eCat").value="";
    document.getElementById("eDesc").value="";

    refresh();
}

function refresh(){
    let html="";

    db.forEach(t=>{
        html+=`
        <tr class="border-b text-center">
            <td class="p-3">${t.date}</td>
            <td class="p-3">${t.cat}</td>
            <td class="p-3">${t.desc}</td>
            <td class="p-3">₹${t.amt}</td>
        </tr>`;
    });

    document.getElementById("resTable").innerHTML=html;
}
</script>

</body>
</html>
