<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHAYARAJ-2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-bg:#0c40bb; --n-col:#ffffff; --out:#54301d; --btm:#0b08d4; --c-let:#e32b2b; --c-num:#1e40af; }
        body { background-color:#475569; font-family:'Arial Black',sans-serif; overflow-x:hidden; }
        * { font-weight:950!important; }

        .main-app-box { border:10px solid var(--out); margin:10px auto; border-radius:40px; background:#f1f5f9; overflow-x:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.5); }
        .premium-header { background-color:var(--p-bg); padding:25px; border-bottom:10px solid var(--btm); }
        .cat-card { background:#fff; border:4px solid var(--out); border-radius:20px; text-align:center; padding:15px 10px; box-shadow:8px 8px 0px var(--out); }
        .btn-style { border-bottom:6px solid rgba(0,0,0,0.4); color:#fff!important; cursor:pointer; text-transform:uppercase; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
        .action-bar { display:flex; width:100%; background:#000; padding:8px; gap:8px; }
        .action-btn { flex:1; padding:12px 0; border:3px solid #fff; color:#fff; font-size:14px; text-align:center; cursor:pointer; border-radius:12px; }
        .action-btn.active { background:#ffeb3b; color:#000; }
        .bell-btn { background:#facc15; color:#000; }
    </style>
</head>
<body onload="checkLogin()">

<!-- LOGIN PAGE -->
<div id="loginPage" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-3xl border-4 border-black shadow-2xl w-[350px]">
        <h2 class="text-2xl text-center mb-6 uppercase">USER LOGIN</h2>
        <input type="text" id="loginUser" placeholder="User ID" class="w-full border-2 border-black p-3 rounded-xl mb-4">
        <input type="password" id="loginPass" placeholder="Password" class="w-full border-2 border-black p-3 rounded-xl mb-4">
        <button onclick="loginUserCheck()" class="w-full bg-blue-700 text-white py-3 rounded-xl btn-style">LOGIN</button>
    </div>
</div>

<!-- APP PAGE -->
<div id="appPage">
    <div id="mainContainer" class="main-app-box mx-auto">
        <div class="premium-header">
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="dispTitle" class="text-4xl italic uppercase" style="color:var(--n-col);">SAHAYARAJ-2026</h1>
                    <div id="liveDateTime" class="text-yellow-300 font-bold text-sm"></div>
                </div>
                <div class="text-right text-white">
                    <p class="text-xs">RECORDS: <span id="recCount">0</span></p>
                    <h2 id="mainTotal" class="text-4xl">₹0</h2>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <div id="viewCR" onclick="setViewMode('CR')" class="action-btn active">CREDIT (+)</div>
            <div id="viewDR" onclick="setViewMode('DR')" class="action-btn">DEBIT (-)</div>
            <div id="viewBOTH" onclick="setViewMode('BOTH')" class="action-btn">BOTH</div>
        </div>

        <div class="p-4">
            <div id="catGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-5 mb-4"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl border-4 border-black">
                    <h3 class="text-xl border-b-4 border-green-600 mb-4 italic uppercase">New Entry</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="eDate" class="border-2 border-black p-3 rounded-xl">
                        <input type="tel" id="eMob" placeholder="Mobile" class="border-2 border-black p-3 rounded-xl">
                        <select id="eCat" class="border-2 border-black p-3 rounded-xl"></select>
                        <input type="text" id="eDesc" placeholder="Remark" class="border-2 border-black p-3 rounded-xl">
                        <input type="number" id="eAmt" placeholder="Amount" class="border-2 border-black p-3 rounded-xl">
                        <select id="eType" class="border-2 border-black p-3 rounded-xl">
                            <option value="CR">IN (+)</option>
                            <option value="DR">OUT (-)</option>
                        </select>
                    </div>
                    <button onclick="saveData()" class="w-full py-4 mt-6 rounded-xl text-xl btn-style bg-green-600">SAVE ✅</button>
                </div>

                <div class="bg-white p-6 rounded-3xl border-4 border-black">
                    <h3 class="text-xl border-b-4 border-blue-600 mb-4 italic uppercase">Search & Tools</h3>
                    <button onclick="refresh()" class="w-full bg-slate-800 text-white py-4 mt-4 rounded-xl btn-style">SEARCH DATA 🔎</button>
                </div>
            </div>

            <div class="mt-8 bg-white border-4 border-black rounded-3xl overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-black text-white">
                        <tr>
                            <th class="p-3">DATE</th>
                            <th class="p-3">MOBILE</th>
                            <th class="p-3">CAT</th>
                            <th class="p-3">REMARK</th>
                            <th class="p-3 text-right">AMOUNT</th>
                        </tr>
                    </thead>
                    <tbody id="resTable" class="text-center"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let users = [
    { id:"user1", pass:"1111", expiry:"2026-12-31" },
    { id:"user2", pass:"2222", expiry:"2026-12-31" },
    { id:"user3", pass:"3333", expiry:"2026-12-31" },
    { id:"user4", pass:"4444", expiry:"2026-12-31" },
    { id:"user5", pass:"5555", expiry:"2026-12-31" }
];

let cfg = {
    title:"SAHAYARAJ-2026",
    cats:["FOOD","SHOP","BILL"]
};

let db = JSON.parse(localStorage.getItem("saha_v66_db")) || [];
let currentViewMode = "CR";

function checkLogin(){
    document.getElementById("appPage").style.display = "none";
}

function loginUserCheck(){
    let uid = document.getElementById("loginUser").value.trim();
    let pwd = document.getElementById("loginPass").value.trim();

    let user = users.find(u => u.id === uid && u.pass === pwd);

    if(!user){
        alert("INVALID USER ID OR PASSWORD");
        return;
    }

    let today = new Date().toISOString().split("T")[0];
    if(today > user.expiry){
        alert("ACCOUNT EXPIRED");
        return;
    }

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("appPage").style.display = "block";
    init();
}

function init(){
    startClock();
    renderUI();
    refresh();
}

function startClock(){
    setInterval(()=>{
        let now = new Date();
        document.getElementById("liveDateTime").innerText = now.toLocaleString();
    },1000);
}

function renderUI(){
    let grid = document.getElementById("catGrid");
    let eCat = document.getElementById("eCat");
    grid.innerHTML = "";
    eCat.innerHTML = "";

    cfg.cats.forEach(c=>{
        grid.innerHTML += `<div class="cat-card"><p>${c}</p><h3>₹<span id="sum_${c}">0</span></h3></div>`;
        eCat.innerHTML += `<option value="${c}">${c}</option>`;
    });
}

function saveData(){
    let d = eDate.value;
    let a = eAmt.value;
    if(!d || !a){ alert("DATE AND AMOUNT REQUIRED"); return; }

    db.push({
        date:d,
        mob:eMob.value || "-",
        cat:eCat.value,
        desc:eDesc.value || "-",
        amt:parseFloat(a),
        type:eType.value
    });

    localStorage.setItem("saha_v66_db", JSON.stringify(db));
    eAmt.value="";
    eDesc.value="";
    refresh();
}

function refresh(){
    let html = "";
    let total = 0;

    db.forEach(t=>{
        if(currentViewMode==="BOTH" || currentViewMode===t.type){
            total += t.type==="CR" ? t.amt : -t.amt;
            html += `
            <tr class="border-b">
                <td class="p-3">${t.date}</td>
                <td class="p-3">${t.mob}</td>
                <td class="p-3">${t.cat}</td>
                <td class="p-3">${t.desc}</td>
                <td class="p-3 text-right">₹${t.amt}</td>
            </tr>`;
        }
    });

    document.getElementById("resTable").innerHTML = html;
    document.getElementById("mainTotal").innerText = "₹"+total;
    document.getElementById("recCount").innerText = db.length;
}

function setViewMode(mode){
    currentViewMode = mode;
    document.querySelectorAll(".action-btn").forEach(btn=>btn.classList.remove("active"));
    document.getElementById("view"+mode).classList.add("active");
    refresh();
}
</script>
</body>
</html>
